version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm-posobra-backend
    restart: unless-stopped
    ports:
      - "3333:3333"
    volumes:
      - uploads:/app/uploads
    environment:
      - PORT=3333
      - JWT_SECRET=${JWT_SECRET:-assistencia-tecnica-secret-key}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crm-posobra-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  uploads:
